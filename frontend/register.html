<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inkraft - Create Account</title>
  <meta name="description" content="Create your free Inkraft account and start converting novels into stunning manga and manhwa comics.">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="auth-pages.css">
</head>
<body class="auth-body">
  <div class="auth-bg">
    <div class="auth-orb auth-orb-1"></div>
    <div class="auth-orb auth-orb-2"></div>
  </div>

  <nav class="auth-nav">
    <a href="/" class="auth-nav-logo">Inkraft</a>
    <a href="/login.html" class="auth-nav-link">← Sign in</a>
  </nav>

  <main class="auth-main">
    <div class="auth-card glass-panel">
      <div class="auth-card-icon">✨</div>
      <h1 class="auth-title">Create your account</h1>
      <p class="auth-subtitle">Start with 10 free credits — no credit card required</p>

      <form id="register-form" class="auth-form" novalidate>
        <div class="form-group">
          <label for="email-input">Email</label>
          <input type="email" id="email-input" name="email" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label for="password-input">Password <span class="label-hint">(min. 8 characters)</span></label>
          <div class="password-wrap">
            <input type="password" id="password-input" name="password" placeholder="Create a strong password" autocomplete="new-password" required minlength="8">
            <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Show password">👁</button>
          </div>
          <div class="pw-strength" id="pw-strength">
            <div class="pw-bar" id="pw-bar"></div>
          </div>
          <span class="pw-strength-label" id="pw-strength-label"></span>
        </div>

        <div id="register-error" class="auth-error hidden"></div>
        <div id="register-success" class="auth-success hidden"></div>

        <button type="submit" class="glow-button auth-submit" id="register-btn">
          <span id="register-btn-text">Create Account</span>
          <span id="register-btn-spinner" class="btn-spinner hidden"></span>
        </button>
      </form>

      <p class="auth-switch">Already have an account? <a href="/login.html">Sign in</a></p>
      <p class="auth-terms">By creating an account you agree to our <a href="#">Terms of Service</a>.</p>
    </div>

    <div class="auth-features">
      <div class="auth-feature-item">
        <span class="feature-icon">🎁</span>
        <span>10 free credits on signup</span>
      </div>
      <div class="auth-feature-item">
        <span class="feature-icon">⚡</span>
        <span>3 free generations per day</span>
      </div>
      <div class="auth-feature-item">
        <span class="feature-icon">🌐</span>
        <span>Share to community gallery</span>
      </div>
    </div>
  </main>

  <script type="module">
    import { authStore, redirectIfLoggedIn } from './auth.js';
    redirectIfLoggedIn('/dashboard.html');

    const form      = document.getElementById('register-form');
    const errorEl   = document.getElementById('register-error');
    const successEl = document.getElementById('register-success');
    const btnText   = document.getElementById('register-btn-text');
    const spinner   = document.getElementById('register-btn-spinner');
    const pwInput   = document.getElementById('password-input');
    const pwBar     = document.getElementById('pw-bar');
    const pwLabel   = document.getElementById('pw-strength-label');
    const togglePw  = document.getElementById('toggle-pw');

    togglePw.addEventListener('click', () => {
      const isHidden = pwInput.type === 'password';
      pwInput.type   = isHidden ? 'text' : 'password';
      togglePw.textContent = isHidden ? '🙈' : '👁';
    });

    pwInput.addEventListener('input', () => {
      const val = pwInput.value;
      let strength = 0;
      if (val.length >= 8)  strength++;
      if (/[A-Z]/.test(val)) strength++;
      if (/[0-9]/.test(val)) strength++;
      if (/[^A-Za-z0-9]/.test(val)) strength++;

      const colors = ['#ef4444','#f59e0b','#22d3ee','#22c55e'];
      const labels = ['Too weak','Fair','Good','Strong'];
      const widths = ['25%','50%','75%','100%'];
      pwBar.style.width      = strength ? widths[strength - 1] : '0%';
      pwBar.style.background = strength ? colors[strength - 1] : 'transparent';
      pwLabel.textContent    = strength ? labels[strength - 1] : '';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.add('hidden');
      successEl.classList.add('hidden');

      const email    = document.getElementById('email-input').value.trim();
      const password = pwInput.value;

      if (password.length < 8) {
        errorEl.textContent = 'Password must be at least 8 characters.';
        errorEl.classList.remove('hidden');
        return;
      }

      btnText.textContent = 'Creating account…';
      spinner.classList.remove('hidden');
      document.getElementById('register-btn').disabled = true;

      try {
        const res  = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Registration failed');

        const token = data.access_token
                   || data.token
                   || data.session?.access_token
                   || data.data?.access_token
                   || data.data?.session?.access_token;
        const user  = data.user
                   || data.session?.user
                   || data.data?.user
                   || { email };

        if (token) {
          authStore.setAuth(token, user);
          window.location.href = '/dashboard.html';
        } else {
          // Email confirmation flow (when Confirm Email is enabled)
          successEl.textContent = 'Account created! Check your email to confirm, then sign in.';
          successEl.classList.remove('hidden');
          setTimeout(() => { window.location.href = '/login.html'; }, 3000);
        }
      } catch (err) {
        // Translate Supabase raw errors into user-friendly messages
        let msg = err.message || 'Registration failed. Please try again.';
        if (msg.toLowerCase().includes('rate limit') || msg.toLowerCase().includes('email rate'))
          msg = 'Too many signup attempts. Please wait 1 hour and try again, or contact support.';
        else if (msg.toLowerCase().includes('already registered') || msg.toLowerCase().includes('already exists') || msg.toLowerCase().includes('user already'))
          msg = 'This email is already registered. Try signing in instead.';
        else if (msg.toLowerCase().includes('invalid email'))
          msg = 'Please enter a valid email address.';
        else if (msg.toLowerCase().includes('password') && msg.toLowerCase().includes('short'))
          msg = 'Password must be at least 8 characters.';
        errorEl.textContent = msg;
        errorEl.classList.remove('hidden');
      } finally {
        btnText.textContent = 'Create Account';
        spinner.classList.add('hidden');
        document.getElementById('register-btn').disabled = false;
      }
    });
  </script>
</body>
</html>
