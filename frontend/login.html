<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inkraft - Login</title>
  <meta name="description" content="Log in to your Inkraft account to access your comics, generation history, and dashboard.">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="auth-pages.css">
</head>
<body class="auth-body">
  <div class="auth-bg">
    <div class="auth-orb auth-orb-1"></div>
    <div class="auth-orb auth-orb-2"></div>
  </div>

  <nav class="auth-nav">
    <a href="/" class="auth-nav-logo">Inkraft</a>
    <a href="/register.html" class="auth-nav-link">Create account →</a>
  </nav>

  <main class="auth-main">
    <div class="auth-card glass-panel">
      <div class="auth-card-icon">🎬</div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Log in to continue creating comics</p>

      <form id="login-form" class="auth-form" novalidate>
        <div class="form-group">
          <label for="email-input">Email</label>
          <input type="email" id="email-input" name="email" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label for="password-input">Password</label>
          <div class="password-wrap">
            <input type="password" id="password-input" name="password" placeholder="••••••••" autocomplete="current-password" required>
            <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Show password">👁</button>
          </div>
        </div>

        <div id="login-error" class="auth-error hidden"></div>

        <button type="submit" class="glow-button auth-submit" id="login-btn">
          <span id="login-btn-text">Sign In</span>
          <span id="login-btn-spinner" class="btn-spinner hidden"></span>
        </button>
      </form>

      <p class="auth-switch">Don't have an account? <a href="/register.html">Register free</a></p>
    </div>

    <div class="auth-features">
      <div class="auth-feature-item">
        <span class="feature-icon">⚡</span>
        <span>3 free comics daily</span>
      </div>
      <div class="auth-feature-item">
        <span class="feature-icon">🎨</span>
        <span>Manga · Manhwa · Cinematic</span>
      </div>
      <div class="auth-feature-item">
        <span class="feature-icon">📚</span>
        <span>Full generation history</span>
      </div>
    </div>
  </main>

  <script type="module">
    import { authStore, redirectIfLoggedIn } from './auth.js?v=2';
    redirectIfLoggedIn('/dashboard.html');

    const form     = document.getElementById('login-form');
    const errorEl  = document.getElementById('login-error');
    const btnText  = document.getElementById('login-btn-text');
    const spinner  = document.getElementById('login-btn-spinner');
    const pwInput  = document.getElementById('password-input');
    const togglePw = document.getElementById('toggle-pw');

    togglePw.addEventListener('click', () => {
      const isHidden = pwInput.type === 'password';
      pwInput.type = isHidden ? 'text' : 'password';
      togglePw.textContent = isHidden ? '🙈' : '👁';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.add('hidden');
      btnText.textContent = 'Signing in…';
      spinner.classList.remove('hidden');
      document.getElementById('login-btn').disabled = true;

      const email    = document.getElementById('email-input').value.trim();
      const password = pwInput.value;

      try {
        const res  = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Login failed');

        // Token can be at multiple locations depending on Supabase vs mock mode
        const token = data.access_token
                   || data.token
                   || data.session?.access_token
                   || data.data?.access_token
                   || data.data?.session?.access_token;
        const user  = data.user
                   || data.session?.user
                   || data.data?.user
                   || { email };
        if (!token) throw new Error('Server did not return an authentication token.');

        authStore.setAuth(token, user);
        window.location.href = '/dashboard.html';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove('hidden');
      } finally {
        btnText.textContent = 'Sign In';
        spinner.classList.add('hidden');
        document.getElementById('login-btn').disabled = false;
      }
    });
  </script>
</body>
</html>
