<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inkraft - Confirming your account</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="auth-pages.css">
  <style>
    .callback-state { text-align: center; padding: 2rem; }
    .callback-icon  { font-size: 3.5rem; margin-bottom: 1rem; display: block; }
    .callback-title { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.5rem; }
    .callback-sub   { opacity: 0.65; font-size: 0.95rem; }
    .spinner-ring   { width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.15);
                      border-top-color: #a78bfa; border-radius: 50%;
                      animation: spin 0.8s linear infinite; margin: 0 auto 1.5rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .auth-error { color: #f87171; background: rgba(239,68,68,0.12);
                  border: 1px solid rgba(239,68,68,0.3); border-radius: 10px;
                  padding: 0.85rem 1.2rem; font-size: 0.9rem; margin-top: 1.2rem; }
    .glow-button { display: inline-block; margin-top: 1.5rem; padding: 0.75rem 2rem;
                   background: linear-gradient(135deg, #7c3aed, #a78bfa);
                   border-radius: 10px; font-weight: 600; text-decoration: none;
                   color: #fff; transition: opacity 0.2s; }
    .glow-button:hover { opacity: 0.85; }
  </style>
</head>
<body class="auth-body">
  <div class="auth-bg">
    <div class="auth-orb auth-orb-1"></div>
    <div class="auth-orb auth-orb-2"></div>
  </div>

  <nav class="auth-nav">
    <a href="/" class="auth-nav-logo">Inkraft</a>
  </nav>

  <main class="auth-main">
    <div class="auth-card glass-panel">

      <!-- LOADING STATE -->
      <div id="state-loading" class="callback-state">
        <div class="spinner-ring"></div>
        <p class="callback-title">Confirming your account…</p>
        <p class="callback-sub">Please wait a moment.</p>
      </div>

      <!-- SUCCESS STATE -->
      <div id="state-success" class="callback-state" style="display:none">
        <span class="callback-icon">✅</span>
        <p class="callback-title">Email confirmed!</p>
        <p class="callback-sub">You're now logged in. Redirecting to your dashboard…</p>
      </div>

      <!-- NEEDS LOGIN STATE -->
      <div id="state-login" class="callback-state" style="display:none">
        <span class="callback-icon">🎬</span>
        <p class="callback-title">Account confirmed!</p>
        <p class="callback-sub">Your email has been verified. Sign in to continue.</p>
        <a href="/login.html" class="glow-button">Sign In Now →</a>
      </div>

      <!-- ERROR STATE -->
      <div id="state-error" class="callback-state" style="display:none">
        <span class="callback-icon">⚠️</span>
        <p class="callback-title">Confirmation issue</p>
        <div id="error-msg" class="auth-error"></div>
        <a href="/register.html" class="glow-button">Try registering again →</a>
      </div>

    </div>
  </main>

  <script type="module">
    import { authStore } from './auth.js';

    const show = (id) => {
      ['state-loading','state-success','state-login','state-error']
        .forEach(s => document.getElementById(s).style.display = s === id ? '' : 'none');
    };

    async function handleCallback() {
      // ── 1. Try URL hash (Supabase implicit flow) ──────────────────────
      // Supabase sends: #access_token=...&type=signup&...
      const hash   = window.location.hash.substring(1);
      const params = new URLSearchParams(hash || window.location.search);

      const errorCode = params.get('error_code') || params.get('error');
      if (errorCode) {
        show('state-error');
        const desc = params.get('error_description') || errorCode;
        document.getElementById('error-msg').textContent =
          desc.replace(/\+/g, ' ') + ' — the link may have expired. Please register again.';
        return;
      }

      const accessToken  = params.get('access_token');
      const refreshToken = params.get('refresh_token');
      const type         = params.get('type'); // 'signup', 'recovery', 'magiclink'

      if (accessToken) {
        // We have tokens from URL hash — store them directly
        const user = { email: params.get('email') || '' };
        authStore.setAuth(accessToken, user);
        show('state-success');
        setTimeout(() => { window.location.href = '/dashboard.html'; }, 1500);
        return;
      }

      // ── 2. Try PKCE flow (token_hash in query string) ──────────────────
      const tokenHash = params.get('token_hash');
      if (tokenHash) {
        try {
          const res  = await fetch(`/api/auth/verify?token_hash=${encodeURIComponent(tokenHash)}&type=${type || 'email'}`, {
            method: 'GET',
          });
          if (res.ok) {
            const data        = await res.json();
            const token       = data.access_token || data.session?.access_token;
            const user        = data.user || {};
            if (token) {
              authStore.setAuth(token, user);
              show('state-success');
              setTimeout(() => { window.location.href = '/dashboard.html'; }, 1500);
              return;
            }
          }
        } catch (_) {}
        // PKCE verification done but no token returned — just show sign-in prompt
        show('state-login');
        return;
      }

      // ── 3. No recognised callback params — show sign-in prompt ─────────
      show('state-login');
    }

    handleCallback();
  </script>
</body>
</html>
