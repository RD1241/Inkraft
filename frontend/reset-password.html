<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inkraft - Reset Password</title>
  <meta name="description" content="Set a new password for your Inkraft account.">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=2">
  <link rel="stylesheet" href="auth-pages.css">
</head>
<body class="auth-body">
  <div class="auth-bg">
    <div class="auth-orb auth-orb-1"></div>
    <div class="auth-orb auth-orb-2"></div>
  </div>

  <div class="auth-split-container">
    <div class="auth-form-side">
      <nav class="auth-nav">
        <a href="/" class="auth-nav-logo">Inkraft</a>
        <a href="/login.html" class="auth-nav-link">Back to Sign In →</a>
      </nav>

      <main class="auth-form-main">
        <div class="auth-card glass-panel">
          <div class="auth-card-icon">🔐</div>
          <h1 class="auth-title">Set new password</h1>
          <p class="auth-subtitle">Choose a strong password for your account</p>

          <!-- Error: no token in URL (expired / wrong link) -->
          <div id="no-token-msg" style="display:none; padding: 1rem; border: 2px solid #ef4444; border-radius: 8px; margin-bottom: 1rem;">
            <p style="font-family: 'Outfit', sans-serif; color: #ef4444; margin: 0 0 0.5rem; font-weight: 600;">⚠️ Invalid or expired reset link</p>
            <p style="font-family: 'Outfit', sans-serif; font-size: 0.85rem; margin: 0; color: #aaa;">This link has expired or is not valid. Please <a href="/login.html" style="color: var(--accent-color);">request a new reset link</a>.</p>
          </div>

          <!-- Reset form (shown when token is present) -->
          <form id="reset-form" class="auth-form" novalidate style="display:none;">
            <div class="form-group">
              <label for="new-password">New Password</label>
              <div class="password-wrap">
                <input type="password" id="new-password" placeholder="At least 6 characters" autocomplete="new-password" required>
                <button type="button" class="toggle-pw" id="toggle-pw1" aria-label="Show password">👁</button>
              </div>
            </div>

            <div class="form-group">
              <label for="confirm-password">Confirm New Password</label>
              <div class="password-wrap">
                <input type="password" id="confirm-password" placeholder="Repeat your new password" autocomplete="new-password" required>
                <button type="button" class="toggle-pw" id="toggle-pw2" aria-label="Show password">👁</button>
              </div>
            </div>

            <!-- Password strength bar -->
            <div style="margin-bottom: 1rem;">
              <div style="height: 4px; background: #222; border-radius: 2px; overflow: hidden;">
                <div id="pw-bar" style="height: 100%; width: 0%; border-radius: 2px; transition: width 0.3s, background 0.3s;"></div>
              </div>
              <span id="pw-label" style="font-size: 0.72rem; color: #888; font-family: 'Outfit', sans-serif;"></span>
            </div>

            <div id="reset-error" class="auth-error hidden"></div>

            <button type="submit" class="glow-button auth-submit" id="reset-btn">
              <span id="reset-btn-text">Update Password</span>
              <span id="reset-btn-spinner" class="btn-spinner hidden"></span>
            </button>
          </form>

          <!-- Success state -->
          <div id="success-msg" style="display:none; text-align: center; padding: 1rem 0;">
            <p style="font-size: 2rem; margin: 0 0 0.75rem;">✅</p>
            <p style="font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.1rem; margin: 0 0 0.5rem;">Password updated!</p>
            <p style="font-family: 'Outfit', sans-serif; font-size: 0.85rem; color: #aaa; margin: 0 0 1.25rem;">You can now sign in with your new password.</p>
            <a href="/login.html" class="glow-button auth-submit" style="display: inline-block; text-align: center; text-decoration: none;">Go to Sign In</a>
          </div>
        </div>
      </main>
    </div>

    <!-- Visual side (reuse manga collage from login) -->
    <div class="auth-visual-side">
      <div class="manga-collage">
        <div class="collage-panel-wrapper panel-1">
          <div class="collage-panel-clipper">
            <div class="collage-panel-content">
              <div class="panel-image-bg" style="background-image: url('/assets/Manga.png');"></div>
              <div class="panel-overlay-dark"></div>
              <div class="collage-caption speed">NEW START!</div>
            </div>
          </div>
        </div>
        <div class="collage-panel-wrapper panel-3">
          <div class="collage-panel-clipper">
            <div class="collage-panel-content">
              <div class="panel-image-bg" style="background-image: url('/assets/Manhwa.png');"></div>
              <div class="panel-overlay-dark"></div>
              <div class="collage-caption highlight">SECURE</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    // Extract the access_token from the URL hash that Supabase puts there
    // e.g. /reset-password.html#access_token=xxx&type=recovery
    function getHashParam(key) {
      const hash = window.location.hash.substring(1); // remove leading #
      const params = new URLSearchParams(hash);
      return params.get(key);
    }

    const accessToken = getHashParam('access_token');
    const tokenType   = getHashParam('type'); // should be 'recovery'

    const noTokenMsg  = document.getElementById('no-token-msg');
    const resetForm   = document.getElementById('reset-form');
    const successMsg  = document.getElementById('success-msg');
    const errorEl     = document.getElementById('reset-error');
    const pwBar       = document.getElementById('pw-bar');
    const pwLabel     = document.getElementById('pw-label');
    const newPwEl     = document.getElementById('new-password');
    const confirmPwEl = document.getElementById('confirm-password');

    // Show form only if there's a valid recovery token in the hash
    if (accessToken && tokenType === 'recovery') {
      resetForm.style.display = 'block';
    } else {
      noTokenMsg.style.display = 'block';
    }

    // --- Password show/hide toggles ---
    document.getElementById('toggle-pw1').addEventListener('click', () => {
      const h = newPwEl.type === 'password';
      newPwEl.type = h ? 'text' : 'password';
      document.getElementById('toggle-pw1').textContent = h ? '🙈' : '👁';
    });
    document.getElementById('toggle-pw2').addEventListener('click', () => {
      const h = confirmPwEl.type === 'password';
      confirmPwEl.type = h ? 'text' : 'password';
      document.getElementById('toggle-pw2').textContent = h ? '🙈' : '👁';
    });

    // --- Password strength meter ---
    newPwEl.addEventListener('input', () => {
      const val = newPwEl.value;
      let strength = 0;
      if (val.length >= 8)         strength++;
      if (/[A-Z]/.test(val))       strength++;
      if (/[0-9]/.test(val))       strength++;
      if (/[^A-Za-z0-9]/.test(val)) strength++;
      const colors = ['#ef4444', '#f59e0b', '#22d3ee', '#22c55e'];
      const labels = ['Too weak', 'Fair', 'Good', 'Strong'];
      const widths = ['25%', '50%', '75%', '100%'];
      pwBar.style.width      = strength ? widths[strength - 1] : '0%';
      pwBar.style.background = strength ? colors[strength - 1] : 'transparent';
      pwLabel.textContent    = strength ? labels[strength - 1] : '';
    });

    // --- Form submit ---
    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.add('hidden');

      const newPassword     = newPwEl.value;
      const confirmPassword = confirmPwEl.value;

      if (newPassword.length < 6) {
        errorEl.textContent = 'Password must be at least 6 characters.';
        errorEl.classList.remove('hidden');
        return;
      }
      if (newPassword !== confirmPassword) {
        errorEl.textContent = 'Passwords do not match.';
        errorEl.classList.remove('hidden');
        return;
      }

      const btnText    = document.getElementById('reset-btn-text');
      const spinner    = document.getElementById('reset-btn-spinner');
      const submitBtn  = document.getElementById('reset-btn');
      btnText.textContent = 'Updating…';
      spinner.classList.remove('hidden');
      submitBtn.disabled = true;

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: accessToken, new_password: newPassword }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Failed to update password.');

        // Success!
        resetForm.style.display = 'none';
        successMsg.style.display = 'block';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove('hidden');
        btnText.textContent = 'Update Password';
        spinner.classList.add('hidden');
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
